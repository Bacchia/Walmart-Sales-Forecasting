model:
  name: "Walmart_LightGBM_Tuned_Final"
  params:
    n_estimators: 12000
    learning_rate: 0.02
    num_leaves: 511
    min_child_samples: 5
    subsample: 1.0
    subsample_freq: 1
    colsample_bytree: 0.9
    reg_alpha: 0
    reg_lambda: 0
    max_depth: -1
    random_state: 42
    n_jobs: -1
    verbose: -1

data:
  split_date: "2012-04-01"

training:
  early_stopping_rounds: 200