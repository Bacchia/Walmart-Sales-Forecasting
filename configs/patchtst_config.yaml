model:
  name: "Walmart_PatchTST"
  common:
    start_padding_enabled: true
    random_seed: 42
  # Candidate configs searched in the notebook; the best is kept for the pipeline.
  search_space:
    - input_size: 104
      patch_len: 8
      stride: 4
      encoder_layers: 3
      n_heads: 8
      hidden_size: 128
      linear_hidden_size: 256
      max_steps: 800
    - input_size: 52
      patch_len: 16
      stride: 8
      encoder_layers: 2
      n_heads: 4
      hidden_size: 64
      linear_hidden_size: 128
      max_steps: 500
data:
  split_date: "2012-01-01"
